<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavalon - A place for peace.</title>
    <link rel="stylesheet" href="style.css">
    <!-- 本地引入 marked.js 解析 Markdown -->
    <script src="marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 头部信息：日期和天气 -->
        <header class="header card">
            <div class="date-section">
                <h1 id="current-time">00:00:00</h1>
                <p id="current-date">正在加载日期...</p>
            </div>
            <div class="weather-section">
                <div id="weather-icon">🌤️</div>
                <div id="city-info">未定位</div>
                <div id="weather-info">点击下方按钮获取天气</div>
                <div>
                    <button id="theme-toggle-btn" class="icon-btn" title="切换亮暗色主题">🌙 切换主题</button>
                    <button id="get-weather-btn" class="icon-btn" title="点击获取定位天气">📍 定位当前天气</button>
                </div>
            </div>
        </header>

        <!-- 主体内容 -->
        <main class="main-content">
            <div class="left-column">
                <!-- 待办事项模块 -->
                <section class="todo-section card">
                    <h2>📝 待办事项</h2>
                    <div class="todo-input-group">
                        <input type="text" id="todo-input" placeholder="添加新任务，按回车键保存...">
                        <button id="add-todo-btn">添加</button>
                    </div>
                    <ul id="todo-list" class="todo-list">
                        <!-- 待办事项将通过 JS 渲染在这里 -->
                    </ul>
                </section>

                <!-- 日历模块 -->
                <section class="calendar-section card">
                    <div class="calendar-header">
                        <button id="prev-month" class="icon-btn">◀</button>
                        <h3 id="calendar-month-year">...</h3>
                        <button id="next-month" class="icon-btn">▶</button>
                    </div>
                    <div class="calendar-weekdays">
                        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                    </div>
                    <div id="calendar-days" class="calendar-days">
                        <!-- 日历格子通过 JS 渲染 -->
                    </div>
                </section>

                <!-- 数据管理模块 -->
                <section class="data-section card">
                    <div class="data-header-flex">
                        <h2>⚙️ 数据管理</h2>
                        <div class="data-tabs">
                            <span id="tab-export" class="data-tab active">导出</span>
                            <span id="tab-import" class="data-tab">导入</span>
                        </div>
                    </div>
                    
                    <div id="export-panel" class="data-btn-group">
                        <button id="export-json-btn" class="export-btn" title="包含所有配置、待办和日记">📦 导出完整备份 (JSON)</button>
                        <button id="export-all-md-btn" class="export-btn" title="将所有日记合并为一个Markdown文件">📚 导出所有小记 (MD)</button>
                        <button id="export-day-md-btn" class="export-btn" title="仅导出当前选中日期的小记">📄 导出当前小记 (MD)</button>
                    </div>

                    <div id="import-panel" class="data-btn-group" style="display: none;">
                        <p class="notes-hint" style="margin-bottom: 5px;">请选择导出的 .json 备份。导入将覆盖当前所有数据！</p>
                        <input type="file" id="import-file" accept=".json" class="file-input">
                        <button id="import-btn" class="danger-btn">⚠️ 确认覆盖导入</button>
                    </div>
                </section>
            </div>

            <div class="right-column">
                <!-- 每日小记模块 -->
                <section class="notes-section card">
                    <div class="notes-header-flex">
                        <h2>📖 每日小记</h2>
                        <button id="toggle-preview-btn" class="icon-btn">预览</button>
                    </div>
                    <p class="notes-hint" id="notes-hint">写下今天的感悟吧，数据会自动保存在本地。支持 Markdown 语法。</p>
                    <div id="md-toolbar" class="md-toolbar">
                        <button type="button" class="toolbar-btn" data-prefix="**" data-suffix="**" title="粗体" aria-label="粗体">B</button>
                        <button type="button" class="toolbar-btn" data-prefix="*" data-suffix="*" title="斜体" aria-label="斜体">I</button>
                        <button type="button" class="toolbar-btn" data-prefix="# " data-suffix="" title="标题" aria-label="标题">H1</button>
                        <button type="button" class="toolbar-btn" data-prefix="- " data-suffix="" title="无序列表" aria-label="无序列表">•</button>
                        <button type="button" class="toolbar-btn" data-prefix="> " data-suffix="" title="引用" aria-label="引用">”</button>
                        <button type="button" class="toolbar-btn" data-prefix="`" data-suffix="`" title="行内代码" aria-label="行内代码">&lt;/&gt;</button>
                        <button type="button" class="toolbar-btn" data-prefix="```\n" data-suffix="\n```" title="代码块" aria-label="代码块">```</button>
                    </div>
                    <textarea id="daily-notes" placeholder="Write something in Markdown..."></textarea>
                    <div id="notes-preview" class="markdown-preview" style="display: none;"></div>
                    <div class="notes-footer">
                        <span id="save-status">Auto saved</span>
                        <button id="clear-notes-btn" class="danger-btn">Clear</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
